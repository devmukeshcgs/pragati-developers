<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + JS</title>
  </head>
  <body>
    <div id="ui">
      <!-- Controller panel -->
      <div id="controller">
        <div class="group">
          <label for="buildingSelect">Building:</label>
          <select id="buildingSelect"></select>
        </div>
        <div class="group">
          <label for="floorCount">Floors:</label>
          <input id="floorCount" type="range" min="1" max="12" value="5" />
          <span id="floorCountLabel">5</span>
        </div>

        <div class="group" id="navButtons">
          <!-- floor navigation buttons will be injected by JS -->
        </div>

        <div class="group">
          <button id="zoomIn">Zoom In</button>
          <button id="zoomOut">Zoom Out</button>
          <button id="resetCam">Reset Camera</button>
          <button id="toggleRotate">Pause Rotate</button>
        </div>
      </div>
    </div>
    <aside id="info">
      <section id="buildingInfo">
        <h2 id="buildingName">Building</h2>
        <div><strong>Type:</strong> <span id="buildingType"></span></div>
        <div><strong>Year Built:</strong> <span id="buildingYear"></span></div>
        <div><strong>Address:</strong>
          <div id="buildingAddress"></div>
        </div>
        <div><strong>Amenities:</strong>
          <ul id="buildingAmenities"></ul>
        </div>
      </section>

      <section id="floorInfo">
        <h3>Floor Details</h3>
        <div id="floorDetails">Select a floor to see details</div>
      </section>
    </aside>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
