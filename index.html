<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + JS</title>
  </head>
  <body>
    <div id="ui">
      <!-- Controller panel -->
      <div id="controller">
        <div class="group">
          <label for="floorCount">Floors:</label>
          <input id="floorCount" type="range" min="1" max="12" value="5" />
          <span id="floorCountLabel">5</span>
        </div>

        <div class="group" id="navButtons">
          <!-- floor navigation buttons will be injected by JS -->
        </div>

        <div class="group">
          <button id="zoomIn">Zoom In</button>
          <button id="zoomOut">Zoom Out</button>
          <button id="resetCam">Reset Camera</button>
          <button id="toggleRotate">Pause Rotate</button>
        </div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
